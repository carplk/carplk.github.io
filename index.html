<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Активация Windows & MS Office</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px 30px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #f0f6fc;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
        }
        .steps {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .step {
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 16px;
        }
        .step-title {
            color: #58a6ff;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .step-desc {
            font-size: 15px;
            line-height: 1.5;
            color: #c9d1d9;
        }
        .step-desc strong {
            color: #f0f6fc;
        }
        .command-box {
            display: flex;
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-top: 12px;
            overflow: hidden;
        }
